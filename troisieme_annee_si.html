<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice de Moyenne</title>
    <link rel="stylesheet" href="deuxieme_annee.css">
</head>

                    <div>

                    </div>
                </div>

                <div class="matiere">

                        <span id="moy_comp"></span>
                    </div>
                </div>

                <div class="matiere">
                    <label class="nom_matiere">Génie Logiciel :</label>

                        <span>TD :<input type="number" id="td_ihm" placeholder="0"></span>

                    </div>
                </div>

                <div class="matiere">

                    <div>

                    </div>
                </div>

                <div class="matiere">
                    <label class="nom_matiere">Economie Numérique et Veille Stratégique :</label>
                    <div>
                        <span>Examen :<input type="number" id="examen_economie" placeholder="0"></span>
                        <span id="moy_economie"></span>
                    </div>
                </div>

                <div>
                    <span id="moyenne_semestrielle"></span>
                </div>
            </div>


            <div class="container2" id="container2_id">
                <div class="entete"><label><strong>SEMESTRE VI</strong></label></div>

                <div class="matiere">
                    <label class="nom_matiere">Applications Mobiles :</label>
                    <div>
                        <span>TP :<input type="number" id="tp_am" placeholder="0"></span>

                        <span id="moy_cds"></span>
                    </div>
                </div>

                <div>
                    <span id="moyenne_semestrielle2"></span>

        </div>

    <script src="scriptcalcul.js"></script>

</html>
