<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        span[id^="moy_"] {
            font-weight: bold;
        }   
        input {
            width: 60px;
        }

        .matiere {
            margin-bottom: 20px;
        }

        .matiere input {
            margin-top: 7px;
        }

        .nom_matiere {
            font-weight: bold;
        }

        .entete {
            margin-bottom: 20px;
        }
    </style>

</head>

<body>
    <div class="entete"><label><strong>Veuillez saisir vos notes</strong></label></div>

    <div class="matiere">
        <label class="nom_matiere">Base de données :</label>
        <div>
            <span>TD :</span><input type="number" id="td_bdd">
            <span>TP :</span><input type="number" id="tp_bdd">
            <span>Examen :</span><input type="number" id="examen_bdd">
            <span id="moy_bdd"></span>
        </div>
    </div>

    <div class="matiere">
        <label class="nom_matiere">Système d'exploitation 1 :</label>
        <div>
            <span>TD : <input type="number" id="td_se"></span>
            <span>TP : <input type="number" id="tp_se"></span>
            <span>Examen : <input type="number" id="examen_se"></span>
            <span id="moy_se"></span>

        </div>
    </div>

    <div class="matiere">
        <label class="nom_matiere">Programmation orienté objet :</label>
        <div>
            <span>TP : <input type="number" id="tp_poo"></span>
            <span>Examen : </span><input type="number" id="examen_poo">
            <span id="moy_poo"></span>
        </div>
    </div>

    <div class="matiere">
        <label class="nom_matiere">Développment d'application web :</label>
        <div><span>TP : <input type="number" id="tp_daw"></span>
            <span>Examen : <input type="number" id="examen_daw"></span>
            <span id="moy_daw"></span>
        </div>
    </div>

    <div class="matiere">
        <label class="nom_matiere">Réseaux de communication :</label>
        <div><span>TD : <input type="number" id="td_reseau"></span>
            <span>TP : <input type="number" id="tp_reseau"></span>
            <span>Examen : <input type="number" id="examen_reseau"></span>
            <span id="moy_reseau"></span>
        </div>
    </div>

    <div class="matiere">
        <label class="nom_matiere">Théorie des langages :</label>
        <div><span>TD : <input type="number" id="td_thl"></span>
            <span>TP : <input type="number" id="tp_thl"></span>
            <span>Examen : </span><input type="number" id="examen_thl">
            <span id="moy_thl"></span>
        </div>
    </div>

    <div class="matiere">
        <label class="nom_matiere">Anglais 3 :</label>
        <div>
            <span>Examen : <input type="number" id="examen_anglais"></span>
            <span id="moy_anglais"></span>
        </div>
    </div>

    <button onclick="calculer()">Calculer</button>

    <script src="scriptcalcul.js"></script>
</body>

</html>
